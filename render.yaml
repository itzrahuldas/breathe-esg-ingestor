databases:
  - name: breathe-esg-db
    databaseName: breathe_esg
    user: breathe_esg_user
    plan: free

services:
  - type: web
    name: breathe-esg-ingestor
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate --no-input && (python manage.py seed_mock_data || echo "Seed skipped") && gunicorn config.wsgi --log-file -
    plan: free
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: breathe-esg-db
          property: connectionString
      - key: DEBUG
        value: false
      - key: CORS_ALLOW_ALL
        value: true
